spring.application.name=currency-service
server.port=8100

spring.datasource.url=jdbc:postgresql://localhost:5432/db_currency
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.locations=classpath:/db_migration

eureka.client.service-url.default-zone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.client.healthcheck.enabled=true
eureka.instance.instance-id=${spring.application.name}:${server.por}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.name=${spring.application.name}
info.app.description=Microservice Java 2026
info.app.author=Fabio Kusaba

eureka.instance.metadata-app.github.repo=fabiokusaba/microservices-java-2026

management.endpoint.health.probes.enabled=true
management.health.defaults.enabled=true